            if (!str) return "";
            const map = { '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#039;' };
            return String(str).replace(/[&<>"']/g, m => map[m]);
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function shuffleQuestionsAndOptions() {
            questions = shuffle(MASTER_DATA);
            questions.forEach(q => {
                if (q.options && q.options.length > 0 && q.answer) {
                    const correctIndex = q.answer.charCodeAt(0) - 65;
                    if (correctIndex >= 0 && correctIndex < q.options.length) {
                        const correctText = q.options[correctIndex];
                        q.options = shuffle(q.options);
                        const newIdx = q.options.indexOf(correctText);
                        q.answer = newIdx !== -1 ? String.fromCharCode(65 + newIdx) : q.answer;
                    }
                }
            });
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader && !loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => loader.remove(), 300);
            }        }

        function init() {
            try {
                shuffleQuestionsAndOptions();
                renderSidebar();
                updateQuestion();
                startTimer();
                if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
            } catch (err) {
                console.error("Init Error:", err);
                document.getElementById('loader').innerHTML = `<div class="text-center"><p class="text-rose-600 font-bold mb-2">⚠️ Error</p><p class="text-xs text-slate-500 mb-4">${err.message}</p><button onclick="location.reload()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold">Reload</button></div>`;
            } finally {
                setTimeout(hideLoader, 2000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isFinished) return;
                timeLeft--;
                if (timeLeft <= 0) { clearInterval(timerInterval); finishExam(); return; }
                const h = Math.floor(timeLeft / 3600);
                const m = Math.floor((timeLeft % 3600) / 60);
                const s = timeLeft % 60;
                const el = document.getElementById('timer-display');
                if (el) el.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function updateQuestion() {
            const q = questions[currentIdx];
            if (!q) return;

            const qNum = document.getElementById('q-number-tag');
            if (qNum) qNum.textContent = `SOAL ${currentIdx + 1}`;

            const qText = document.getElementById('q-text');
            if (qText) qText.innerHTML = escapeHTML(q.question);

            const codeCont = document.getElementById('q-code-container');
            const codeEl = document.getElementById('q-code');
            if (q.code) {
                codeCont?.classList.remove('hidden');
                if (codeEl) codeEl.textContent = q.code;
            } else {
                codeCont?.classList.add('hidden');
            }

            const sub = document.getElementById('q-sub');            if (q.subQuestion) {
                sub?.classList.remove('hidden');
                const subP = sub?.querySelector('p');
                if (subP) subP.innerHTML = escapeHTML(q.subQuestion);
            } else {
                sub?.classList.add('hidden');
            }

            const grid = document.getElementById('options-grid');
            if (grid) {
                grid.innerHTML = '';
                q.options.forEach((opt, i) => {
                    const char = String.fromCharCode(65 + i);
                    const isSel = answers[currentIdx] === char;
                    const isCorr = q.answer === char;
                    let c = "w-full option-card p-4 rounded-2xl border-2 transition-all cursor-pointer ";
                    let ic = "w-8 h-8 shrink-0 rounded-xl flex items-center justify-center font-black text-xs ";

                    if (isFinished) {
                        if (isCorr) { c += "border-emerald-500 bg-emerald-50 text-emerald-900"; ic += "bg-emerald-500 text-white"; }
                        else if (isSel && !isCorr) { c += "border-rose-500 bg-rose-50 text-rose-900"; ic += "bg-rose-500 text-white"; }
                        else { c += "border-slate-100 bg-white opacity-60 cursor-not-allowed"; ic += "bg-slate-100 text-slate-400"; }
                    } else {
                        if (isSel) { c += "border-indigo-600 bg-indigo-50/50 text-indigo-900 shadow-sm"; ic += "bg-indigo-600 text-white shadow-md"; }
                        else { c += "border-slate-100 bg-white hover:border-slate-300 hover:bg-slate-50"; ic += "bg-slate-100 text-slate-400"; }
                    }

                    const btn = document.createElement('button');
                    btn.className = c; btn.disabled = isFinished;
                    btn.onclick = () => !isFinished && selectOption(char);
                    btn.innerHTML = `<div class="${ic}">${char}</div><span class="option-text text-sm font-bold">${escapeHTML(opt)}</span>`;
                    grid.appendChild(btn);
                });
            }

            const badge = document.getElementById('correction-badge');
            if (badge) {
                if (isFinished) {
                    badge.classList.remove('hidden');
                    const u = answers[currentIdx];
                    badge.textContent = u === q.answer ? "BENAR" : (u ? "SALAH" : "KOSONG");
                    badge.className = `px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider ${u === q.answer ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`;
                } else badge.classList.add('hidden');
            }

            document.getElementById('btn-prev').disabled = currentIdx === 0;
            if (currentIdx === questions.length - 1) {
                document.getElementById('btn-next')?.classList.add('hidden');
                if (!isFinished) document.getElementById('btn-finish')?.classList.remove('hidden');
            } else {                document.getElementById('btn-next')?.classList.remove('hidden');
                document.getElementById('btn-finish')?.classList.add('hidden');
            }

            const btnDoubt = document.getElementById('btn-doubt');
            const doubtText = document.getElementById('doubt-text');
            if (btnDoubt && doubtText) {
                btnDoubt.className = doubts[currentIdx] ? "flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-black border border-amber-500 bg-amber-500 text-white shadow-sm" : "flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-200 text-slate-400";
                doubtText.textContent = doubts[currentIdx] ? "DITANDAI RAGU" : "RAGU-RAGU";
            }

            updateProgress();
            renderSidebar();

            try {
                if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise().catch(() => {});
            } catch(e) {}
        }

        function selectOption(char) { if (!isFinished) { answers[currentIdx] = char; updateQuestion(); } }
        function toggleDoubt() { if (!isFinished) { doubts[currentIdx] = !doubts[currentIdx]; updateQuestion(); } }
        function nextQ() { if (currentIdx < questions.length - 1) { currentIdx++; updateQuestion(); scrollToTop(); } }
        function prevQ() { if (currentIdx > 0) { currentIdx--; updateQuestion(); scrollToTop(); } }
        function jumpTo(idx) { currentIdx = idx; updateQuestion(); if (window.innerWidth < 1024) toggleSidebar(); scrollToTop(); }
        function scrollToTop() { document.querySelector('main')?.scrollTo({ top: 0, behavior: 'smooth' }); }
        function updateProgress() { const p = (Object.keys(answers).length / questions.length) * 100; const b = document.getElementById('top-progress'); if (b) b.style.width = `${p}%`; }

        function renderSidebar() {
            const grid = document.getElementById('grid-nav');
            if (!grid) return;
            grid.innerHTML = '';
            questions.forEach((q, i) => {
                const btn = document.createElement('button');
                const isAns = answers[i] !== undefined, isDbt = doubts[i] === true, isAct = currentIdx === i;
                let cls = "h-10 rounded-xl text-[10px] font-black transition-all border-2 focus:outline-none ";
                if (isFinished) {
                    if (answers[i] === q.answer) cls += "bg-emerald-500 border-emerald-500 text-white ";
                    else if (answers[i]) cls += "bg-rose-500 border-rose-500 text-white ";
                    else cls += "bg-slate-200 border-slate-200 text-slate-500 ";
                } else {
                    if (isAns && isDbt) cls += "bg-indigo-600 border-amber-500 text-white ";
                    else if (isAns) cls += "bg-indigo-600 border-indigo-600 text-white ";
                    else if (isDbt) cls += "bg-white border-amber-500 text-amber-500 ";
                    else cls += "bg-white border-slate-200 text-slate-400 hover:border-slate-300 ";
                }
                if (isAct) cls += "ring-2 ring-indigo-400 ring-offset-1 ";
                btn.className = cls; btn.textContent = i + 1; btn.onclick = () => jumpTo(i);
                grid.appendChild(btn);
            });
        }
        function toggleSidebar() {
            document.getElementById('sidebar')?.classList.toggle('translate-x-full');
            document.getElementById('overlay')?.classList.toggle('active');
        }

        function finishExam() {
            if (isFinished) return;
            clearInterval(timerInterval);
            isFinished = true;
            let correct = 0;
            questions.forEach((q, i) => { if (answers[i] === q.answer) correct++; });
            const finalScore = Math.round((correct / questions.length) * 100);
            document.getElementById('final-score').textContent = finalScore;
            document.getElementById('final-summary').textContent = `Menjawab ${correct} dari ${questions.length} soal dengan benar.`;
            document.getElementById('modal-result')?.classList.remove('hidden');
            document.getElementById('timer-box')?.classList.add('hidden');
            document.getElementById('main-submit-btn')?.classList.add('hidden');
            document.getElementById('btn-finish')?.classList.add('hidden');
            updateQuestion();
        }

        function closeResult() { document.getElementById('modal-result')?.classList.add('hidden'); }

        function safeInit() {
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        }
        safeInit();
    </script>
</body>
</html>
